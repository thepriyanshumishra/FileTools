<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- High-end SaaS Gradients -->
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F355DA" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
    <linearGradient id="flow-arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#F355DA" />
    </linearGradient>
    
    <!-- 3D Shadow Filters -->
    <filter id="glow-shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#7000FF" flood-opacity="0.35" />
    </filter>
    <filter id="overlay-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="-6" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Deep space background card -->
  <rect width="512" height="512" rx="128" fill="#09090b" />
  
  <!-- Subtle editor layout lines -->
  <path d="M128 0v512M256 0v512M384 0v512M0 128h512M0 256h512M0 384h512" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.5" />
  <circle cx="256" cy="256" r="220" stroke="#ffffff" stroke-opacity="0.02" stroke-width="2" />

  <!-- Sheet 1 (Source File - Cyan/Blue) -->
  <g filter="url(#glow-shadow)">
    <path d="M140 130h120l70 70v162c0 16.569-13.431 30-30 30H140c-16.569 0-30-13.431-30-30V160c0-16.569 13.431-30 30-30Z" fill="url(#grad-cyan)" fill-opacity="0.85" />
    <path d="M260 130v70h70L260 130Z" fill="#ffffff" fill-opacity="0.35" />
  </g>

  <!-- Sheet 2 (Processed Target File - Violet/Purple, Rotated & Offset for converting feel) -->
  <g filter="url(#overlay-shadow)" transform="rotate(6 256 256) translate(28 20)">
    <path d="M170 150h120l70 70v162c0 16.569-13.431 30-30 30H170c-16.569 0-30-13.431-30-30V180c0-16.569 13.431-30 30-30Z" fill="url(#grad-purple)" fill-opacity="0.9" />
    <path d="M290 150v70h70L290 150Z" fill="#ffffff" fill-opacity="0.45" />
  </g>

  <!-- Glowing Flow Arrow indicator -->
  <g filter="url(#overlay-shadow)">
    <path d="M210 270h76M286 270l-20-20M286 270l-20 20" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
